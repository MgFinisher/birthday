<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Alex! ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle at center, #2c1a4d 0%, #0f0c1b 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Twinkling Stars Background */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="10" cy="20" r="1" fill="rgba(255,255,255,0.4)"/><circle cx="70" cy="60" r="1.5" fill="rgba(255,255,255,0.6)"/><circle cx="40" cy="80" r="1" fill="rgba(255,255,255,0.3)"/></svg>') repeat;
            opacity: 0.6;
            z-index: 1;
        }

        .hint {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        /* Card Container */
        .card-box {
            width: 400px;
            height: 580px;
            position: relative;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden; 
            cursor: pointer;
            z-index: 5;
        }

        /* Inside Message Layer */
        .card-inside {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #fff0f5 100%);
            color: #2c1a4d;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            z-index: 1;
        }

        .card-inside h1 {
            font-size: 2.4rem;
            background: linear-gradient(45deg, #ff4081, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
        }

        .card-inside p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #554d64;
            max-width: 90%;
        }

        /* --- THE BEAUTIFUL 3-TIER CAKE --- */
        .cake-wrapper {
            position: relative;
            width: 200px;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            margin: 20px 0;
        }

        /* Cake Stand */
        .cake-stand {
            width: 220px;
            height: 12px;
            background: linear-gradient(to right, #e0e0e0, #ffffff, #b5b5b5);
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 2;
        }

        /* Base Tier Properties */
        .tier {
            position: relative;
            border-radius: 12px 12px 4px 4px;
            box-shadow: inset 0 6px 0 rgba(255,255,255,0.3), 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Bottom Tier */
        .tier-bottom {
            width: 180px;
            height: 65px;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            z-index: 3;
        }

        /* Middle Tier */
        .tier-middle {
            width: 140px;
            height: 55px;
            background: linear-gradient(to right, #ff9a9e, #fecfef);
            z-index: 4;
        }

        /* Top Tier */
        .tier-top {
            width: 100px;
            height: 45px;
            background: linear-gradient(to right, #a1c4fd, #c2e9fb);
            z-index: 5;
        }

        /* Frosting Drips */
        .dripping-cream {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 18px;
            background: #ffffff;
            border-radius: 0 0 8px 8px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
        }
        .dripping-cream::after {
            content: '';
            position: absolute;
            top: 100%; left: 15%; width: 12px; height: 10px;
            background: #ffffff;
            border-radius: 0 0 50% 50%;
            box-shadow: 25px -4px 0 #ffffff, 50px -2px 0 #ffffff, 80px -5px 0 #ffffff, 110px 2px 0 #ffffff;
        }

        /* Candles & Flickering Flames */
        .candles-row {
            display: flex;
            justify-content: space-around;
            width: 70px;
            position: absolute;
            bottom: 165px;
            z-index: 6;
        }
        .mini-candle {
            width: 6px;
            height: 22px;
            background: linear-gradient(to top, #ffd166, #06d6a0);
            border-radius: 2px;
            position: relative;
        }
        .mini-candle:nth-child(2) {
            background: linear-gradient(to top, #ff4081, #7c4dff);
            height: 26px;
            bottom: -4px;
        }
        .candle-flame {
            position: absolute;
            top: -12px; left: 50%;
            transform: translateX(-50%);
            width: 8px; height: 14px;
            background: #ffeb3b;
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            box-shadow: 0 0 12px #ff5722, 0 0 4px #ffeb3b;
            animation: flicker 0.5s ease-in-out infinite alternate;
        }
        .mini-candle:nth-child(2) .candle-flame {
            animation-delay: 0.15s;
        }
        .mini-candle:nth-child(3) .candle-flame {
            animation-delay: 0.3s;
        }

        .signature {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #9c27b0;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* Premium Glass Front Cover (Slides UP) */
        .card-front {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.3) 0%, rgba(74, 20, 140, 0.5) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .card-box.revealed .card-front {
            transform: translateY(-101%); 
        }

        .cover-design {
            text-align: center;
            color: #fff;
        }

        .cover-design h2 {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff8da1, #d49aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glow-gift {
            font-size: 5rem;
            filter: drop-shadow(0 0 15px rgba(255, 105, 180, 0.6));
            animation: float 3s ease-in-out infinite;
        }

        /* Confetti Canvas */
        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes flicker {
            0% { transform: translateX(-50%) scale(0.9) rotate(-2deg); opacity: 0.8; }
            100% { transform: translateX(-50%) scale(1.1) rotate(2deg); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="hint" id="hintText">✨ Tap the gift to surprise Alex! ✨</div>

    <div class="card-box" id="birthdayCard">
        <!-- INSIDE REVEALED CONTENT -->
        <div class="card-inside">
            <h1>Happy Birthday, Abrar! 🎂</h1>
            <p>May your canvas of life be painted with beautiful moments, bright choices, and infinite joy.</p>
            
            <!-- STUNNING 3-TIER CAKE -->
            <div class="cake-wrapper">
                <!-- Three Candles on top tier -->
                <div class="candles-row">
                    <div class="mini-candle"><div class="candle-flame"></div></div>
                    <div class="mini-candle"><div class="candle-flame"></div></div>
                    <div class="mini-candle"><div class="candle-flame"></div></div>
                </div>
                
                <!-- Tiers -->
                <div class="tier tier-top"><div class="dripping-cream"></div></div>
                <div class="tier tier-middle"><div class="dripping-cream"></div></div>
                <div class="tier tier-bottom"><div class="dripping-cream"></div></div>
                
                <!-- Stand Base -->
                <div class="cake-stand"></div>
            </div>

            <p>Cheers to another gorgeous year of growth, adventures, and laughs!</p>
            <div class="signature">Made With Love ❤️</div>
        </div>

        <!-- FRONT COVER OVERLAY -->
        <div class="card-front">
            <div class="cover-design">
                <h2>For Alex...</h2>
                <div class="glow-gift">🎁</div>
            </div>
        </div>
    </div>

    <canvas id="confettiCanvas"></canvas>

    <script>
        const cardBox = document.getElementById('birthdayCard');
        const hint = document.getElementById('hintText');
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = window.innerWidth / 2;
                this.y = window.innerHeight / 2;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() - 0.5) * 15;
                this.speedY = (Math.random() - 0.7) * 15 - 5;
                this.gravity = 0.2;
                this.color = `hsl(${Math.random() * 360}, 85%, 65%)`;
                this.opacity = 1;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y > canvas.height) this.opacity = 0;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function explodeConfetti() {
            for (let i = 0; i < 140; i++) {
                particles.push(new Particle());
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(index, 1);
            });
            requestAnimationFrame(animateConfetti);
        }

        cardBox.addEventListener('click', () => {
            if (!cardBox.classList.contains('revealed')) {
                cardBox.classList.add('revealed');
                hint.style.opacity = '0';
                
                setTimeout(() => {
                    explodeConfetti();
                    animateConfetti();
                }, 300);
            }
        });
    </script>
</body>
</html>
